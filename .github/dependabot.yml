version: 2

updates:
  # pnpm workspace dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      # Security patches get their own PR — merged first, faster review cycle
      security-patches:
        applies-to: security-updates
        update-types:
          - "patch"
      # All other minor/patch updates batched together
      dependencies:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"

  # Python microservices — one entry per service
  - package-ecosystem: "pip"
    directory: "/services/ai"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/services/billing"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/services/content"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/services/ecommerce"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/services/event-ingest"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/services/recsys"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/services/web3"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    groups:
      python-security:
        applies-to: security-updates
        update-types: ["patch"]
      python-deps:
        update-types: ["minor", "patch"]

  # Docker base images — monthly cadence (digest SHA updates)
  - package-ecosystem: "docker"
    directory: "/apps/api-gateway"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/apps/landing-page"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2

  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
