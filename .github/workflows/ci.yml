name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ── Detect which apps/packages changed ──────────────────────────────────
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      landing-page: ${{ steps.filter.outputs.landing-page }}
      studio: ${{ steps.filter.outputs.studio }}
      docs-hub: ${{ steps.filter.outputs.docs-hub }}
      packages: ${{ steps.filter.outputs.packages }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            api-gateway:
              - 'apps/api-gateway/**'
              - 'packages/**'
            landing-page:
              - 'apps/landing-page/**'
              - 'packages/**'
            studio:
              - 'apps/studio/**'
              - 'packages/**'
            docs-hub:
              - 'apps/docs-hub/**'
              - 'packages/**'
            packages:
              - 'packages/**'
            db:
              - 'packages/db/**'

  # ── Commit message validation (PRs only) ────────────────────────────────
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Lint & type-check (affected packages only) ──────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Architecture smoke checks
        run: |
          python3 -m compileall -q services
          pnpm test:arch

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Resolve Turbo base ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          echo "TURBO_BASE_REF=$BASE_SHA" >> "$GITHUB_ENV"
          echo "Using TURBO_BASE_REF=$BASE_SHA"

      - name: Lint (affected)
        run: pnpm turbo lint --filter="...[${TURBO_BASE_REF}]..."

      - name: Typecheck (affected)
        run: pnpm turbo typecheck --filter="...[${TURBO_BASE_REF}]..."

  # ── Build (affected packages only) ──────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Resolve Turbo base ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          echo "TURBO_BASE_REF=$BASE_SHA" >> "$GITHUB_ENV"
          echo "Using TURBO_BASE_REF=$BASE_SHA"

      - name: Build (affected)
        run: pnpm turbo build --filter="...[${TURBO_BASE_REF}]..."
        env:
          SKIP_ENV_VALIDATION: true

  # ── Tests (affected packages only) ──────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Turbo base ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          echo "TURBO_BASE_REF=$BASE_SHA" >> "$GITHUB_ENV"
          echo "Using TURBO_BASE_REF=$BASE_SHA"

      - name: Run tests (affected)
        run: pnpm turbo test --filter="...[${TURBO_BASE_REF}]..."
        env:
          CI: true

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage for core utility packages
        run: |
          pnpm --filter @nebutra/preset test:coverage
          pnpm --filter @nebutra/alerting test:coverage
          pnpm --filter @nebutra/rate-limit test:coverage
        env:
          CI: true

  # ── Database schema validation (only when db/ changed) ──────────────────
  db-check:
    name: Database Schema Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.db == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm db:generate

  # ── Security scanning ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (high severity)
        run: pnpm audit --audit-level=high

      - name: Check for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy jobs ──────────────────────────────────────────────────────────
  # Add a deploy job per app here, gated by detect-changes output.
  # Each job only runs when its own app directory (or shared packages) changed.
  #
  # Template:
  #
  #   deploy-web:
  #     name: Deploy Web
  #     runs-on: ubuntu-latest
  #     needs: [detect-changes, build]
  #     if: needs.detect-changes.outputs.web == 'true'
  #     environment: production
  #     steps:
  #       - uses: actions/checkout@v6
  #       - name: Deploy
  #         run: <your deploy command>
  #
  #   deploy-api-gateway:
  #     name: Deploy API Gateway
  #     runs-on: ubuntu-latest
  #     needs: [detect-changes, build]
  #     if: needs.detect-changes.outputs.api-gateway == 'true'
  #     steps: ...

  # ── Lighthouse CI (landing page, PRs only) ───────────────────────────────
  # Audits the public marketing site for performance, accessibility,
  # best-practices, and SEO.
  #
  # Thresholds (defined in lighthouserc.json at repo root):
  #   accessibility  ≥ 0.95  → "error"  — BLOCKS the PR on failure
  #   performance    ≥ 0.80  → "warn"   — reports but does not block
  #   best-practices ≥ 0.90  → "warn"   — reports but does not block
  #   seo            ≥ 0.90  → "warn"   — reports but does not block
  lighthouse:
    name: Lighthouse CI (landing page)
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Only run on PRs and only when landing-page or shared packages changed
    if: |
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.landing-page == 'true' || needs.detect-changes.outputs.packages == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing page
        run: pnpm --filter @nebutra/landing-page build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm turbo run e2e
        env:
          CI: true
