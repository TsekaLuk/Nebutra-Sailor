name: Docker Build & Push

# Builds and pushes Docker images for all services to configured container registries.
#
# Supported registries (each is optional — only activated when the corresponding
# secret is present):
#   - GitHub Container Registry (ghcr.io) — always attempted if GITHUB_TOKEN is available
#   - AWS Elastic Container Registry (ECR)        — requires AWS_ACCOUNT_ID + AWS_REGION
#   - Alibaba Cloud Container Registry (Aliyun)   — requires ALIYUN_ACR_USERNAME + ALIYUN_ACR_PASSWORD
#   - Tencent Cloud Container Registry (TCR)      — requires TENCENT_TCR_HOST + TENCENT_TCR_USERNAME + TENCENT_TCR_PASSWORD
#
# Tag strategy:
#   main branch push  → :latest + :sha-<short-sha>
#   tag push (v*)     → :<tag-name>  (e.g. v1.2.3)
#   workflow_dispatch → :latest + :sha-<short-sha>  (on the chosen branch)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual build"

# Prevent concurrent runs for the same ref — cancel in-flight runs when a new
# push arrives so we don't waste runner minutes on stale builds.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write        # push to ghcr.io
  security-events: write # upload Trivy SARIF
  id-token: write        # OIDC token for AWS role assumption (keyless auth)

env:
  # ── Turborepo remote cache ──────────────────────────────────────────────────
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # ── Registry base paths (populated from secrets at run time) ────────────────
  GHCR_REGISTRY: ghcr.io/${{ github.repository_owner }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  # AWS_REGION is a non-sensitive var — store in GitHub Actions Variables, not Secrets
  AWS_REGION: ${{ vars.AWS_REGION }}
  ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
  TENCENT_TCR_HOST: ${{ secrets.TENCENT_TCR_HOST }}

jobs:
  # ============================================================================
  # Job: build-push-node-apps
  # Builds multi-platform images for the three Next.js / Node.js applications.
  # ============================================================================
  build-push-node-apps:
    name: "Build Node app: ${{ matrix.app }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Don't cancel sibling jobs if one app fails
      matrix:
        app:
          - web
          - landing-page
          - api-gateway

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker registry names must be all-lowercase; bash ,, expansion lowercases.
      - name: Set lowercase owner
        id: lowercase
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      # ── Docker Buildx (multi-platform builder) ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      # ── Registry logins (conditional — only when secrets are present) ────────

      # GitHub Container Registry — always available via GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # AWS ECR — OIDC keyless auth (no long-lived credentials stored as secrets).
      # Prerequisites:
      #   1. Create an IAM OIDC provider for token.actions.githubusercontent.com
      #   2. Create an IAM role with trust policy scoped to this repo + ECR push permissions
      #   3. Set AWS_ECR_ROLE_ARN secret to arn:aws:iam::<account>:role/<role-name>
      - name: Configure AWS credentials (OIDC)
        if: env.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          role-session-name: github-actions-ecr-push-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to AWS ECR
        if: env.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != ''
        uses: aws-actions/amazon-ecr-login@v2

      # Alibaba Cloud ACR — requires ALIYUN_ACR_USERNAME + ALIYUN_ACR_PASSWORD
      - name: Log in to Aliyun Container Registry
        if: env.ALIYUN_ACR_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # Tencent TCR — requires TENCENT_TCR_HOST + TENCENT_TCR_USERNAME + TENCENT_TCR_PASSWORD
      - name: Log in to Tencent Container Registry
        if: env.TENCENT_TCR_HOST != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TENCENT_TCR_HOST }}
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      # ── Image metadata (tags + OCI labels) ──────────────────────────────────
      # docker/metadata-action generates all required tags automatically:
      #   - On main branch: latest + sha-<short-sha>
      #   - On semver tag:  the tag itself (e.g. v1.2.3)
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.app }}
            ${{ secrets.AWS_ACCOUNT_ID != '' && format('{0}.dkr.ecr.{1}.amazonaws.com/nebutra-{2}', secrets.AWS_ACCOUNT_ID, secrets.AWS_REGION, matrix.app) || '' }}
            ${{ secrets.ALIYUN_ACR_USERNAME != '' && format('registry.cn-hangzhou.aliyuncs.com/nebutra/{0}', matrix.app) || '' }}
            ${{ secrets.TENCENT_TCR_HOST != '' && format('{0}/nebutra/{1}', secrets.TENCENT_TCR_HOST, matrix.app) || '' }}
          tags: |
            # Tag with :latest on main branch pushes and manual triggers
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            # Tag with short SHA on branch pushes
            type=sha,prefix=sha-,format=short,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            # Tag with semver version on tag pushes (e.g. v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=nebutra-${{ matrix.app }}
            org.opencontainers.image.vendor=Nebutra

      # ── Install cosign (keyless signing via Sigstore OIDC) ───────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_RELEASE=${{ github.ref_name }}+${{ github.sha }}
            GITHUB_SHA=${{ github.sha }}
          # Use GHCR as the layer cache backend — avoids cold-cache on every run
          cache-from: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.app }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.app }}:buildcache,mode=max

      # ── Sign image with cosign (keyless, Sigstore OIDC — no keys to rotate) ──
      # Signs only on main pushes and semver tags to avoid signing PR images.
      # Verification: cosign verify --certificate-identity-regexp="github.com/..."
      - name: Sign container image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.app }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

      # ── Trivy vulnerability scan ─────────────────────────────────────────────
      - name: Scan image for vulnerabilities
        id: trivy
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        if: success()
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: false

      - name: Ensure SARIF file exists
        if: always()
        run: |
          if [ ! -f "trivy-results.sarif" ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy"}},"results":[]}]}' > trivy-results.sarif
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d # v3
        if: always() && steps.trivy.outcome != 'skipped'
        with:
          sarif_file: "trivy-results.sarif"

  # ============================================================================
  # Job: build-push-python-services
  # Builds multi-platform images for Python FastAPI microservices.
  # All services share a single Dockerfile (infra/docker/Dockerfile.python)
  # and are differentiated via the SERVICE build argument.
  # ============================================================================
  build-push-python-services:
    name: "Build Python service: ${{ matrix.service }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Don't cancel sibling jobs if one service fails
      matrix:
        service:
          - ai
          - billing
          - content
          - ecommerce
          - recsys
          - event-ingest
          - web3

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: lowercase
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      # ── Docker Buildx (multi-platform builder) ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      # ── Registry logins (conditional — only when secrets are present) ────────

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        if: env.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          role-session-name: github-actions-ecr-push-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to AWS ECR
        if: env.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != ''
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Aliyun Container Registry
        if: env.ALIYUN_ACR_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Log in to Tencent Container Registry
        if: env.TENCENT_TCR_HOST != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TENCENT_TCR_HOST }}
          username: ${{ secrets.TENCENT_TCR_USERNAME }}
          password: ${{ secrets.TENCENT_TCR_PASSWORD }}

      # ── Image metadata ───────────────────────────────────────────────────────
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.service }}
            ${{ secrets.AWS_ACCOUNT_ID != '' && format('{0}.dkr.ecr.{1}.amazonaws.com/nebutra-{2}', secrets.AWS_ACCOUNT_ID, secrets.AWS_REGION, matrix.service) || '' }}
            ${{ secrets.ALIYUN_ACR_USERNAME != '' && format('registry.cn-hangzhou.aliyuncs.com/nebutra/{0}', matrix.service) || '' }}
            ${{ secrets.TENCENT_TCR_HOST != '' && format('{0}/nebutra/{1}', secrets.TENCENT_TCR_HOST, matrix.service) || '' }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-,format=short,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=nebutra-${{ matrix.service }}
            org.opencontainers.image.vendor=Nebutra

      # ── Install cosign (keyless signing via Sigstore OIDC) ───────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # ── Build & push ─────────────────────────────────────────────────────────
      # Uses the shared Dockerfile.python with SERVICE build arg to select
      # the correct service directory inside services/<SERVICE>/
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.python
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SERVICE=${{ matrix.service }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-backed layer cache using GHCR — shared across branches
          cache-from: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.service }}:buildcache,mode=max

      # ── Sign image with cosign (keyless, Sigstore OIDC) ──────────────────────
      - name: Sign container image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.lowercase.outputs.owner }}/nebutra-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

      # ── Trivy vulnerability scan ─────────────────────────────────────────────
      - name: Scan image for vulnerabilities
        id: trivy
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        if: success()
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: false

      - name: Ensure SARIF file exists
        if: always()
        run: |
          if [ ! -f "trivy-results.sarif" ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy"}},"results":[]}]}' > trivy-results.sarif
          fi

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d # v3
        if: always() && steps.trivy.outcome != 'skipped'
        with:
          sarif_file: "trivy-results.sarif"
