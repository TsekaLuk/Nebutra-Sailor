name: Stale Issues & PRs

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale issues/PRs
        uses: actions/stale@v9
        with:
          # Issues
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment
            or remove the `stale` label.
          close-issue-message: >
            This issue was closed due to inactivity. Feel free to re-open if it
            is still relevant.
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,bug,P0,P1"
          days-before-issue-stale: 30
          days-before-issue-close: 7

          # Pull Requests
          stale-pr-message: >
            This pull request has been inactive for 21 days and will be closed
            in 7 days unless there is new activity. If it is still in progress,
            please rebase and leave a comment.
          close-pr-message: >
            This PR was closed due to inactivity. Re-open if you'd like to
            continue the work — all commits are preserved.
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security,do-not-merge"
          days-before-pr-stale: 21
          days-before-pr-close: 7

          # Common
          remove-stale-when-updated: true
          operations-per-run: 100
