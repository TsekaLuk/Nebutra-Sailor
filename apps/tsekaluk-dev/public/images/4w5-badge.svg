<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg4w5" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bg4w5)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.5"/>

  <!-- Enneagram outer ring (r=68) -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.35"/>

  <!-- 9 dots on the ring -->
  <!-- P1  --> <circle cx="100"   cy="32"   r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P2  --> <circle cx="143.7" cy="47.9" r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P3  --> <circle cx="166.9" cy="88.2" r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P4  --> <circle cx="158.9" cy="134"  r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P5  --> <circle cx="123.3" cy="163.9" r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P6  --> <circle cx="76.7"  cy="163.9" r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P7  --> <circle cx="41.1"  cy="134"  r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P8  --> <circle cx="33.1"  cy="88.2" r="2.5" fill="#f59e0b" opacity="0.55"/>
  <!-- P9  --> <circle cx="56.3"  cy="47.9" r="2.5" fill="#f59e0b" opacity="0.55"/>

  <!-- Inner hexagram: P1→P4→P2→P8→P5→P7→P1 -->
  <path d="M100,32 L158.9,134 L143.7,47.9 L33.1,88.2 L123.3,163.9 L41.1,134 Z"
        fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.28"/>

  <!-- Inner triangle: P3→P6→P9→P3 -->
  <path d="M166.9,88.2 L76.7,163.9 L56.3,47.9 Z"
        fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.28"/>

  <!-- Main "4" -->
  <text x="83" y="115"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="70" font-weight="700"
        fill="#92400e" opacity="0.92">4</text>

  <!-- "w5" superscript-style -->
  <text x="131" y="98"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="600"
        fill="#b45309" opacity="0.85">w5</text>

  <!-- "THE BOHEMIAN" -->
  <text x="100" y="172"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="9.5" font-weight="600"
        letter-spacing="2.8"
        fill="#a16207">THE BOHEMIAN</text>
</svg>
