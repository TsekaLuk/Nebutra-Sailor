<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgIntp" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f0fa"/>
      <stop offset="100%" stop-color="#ede0f5"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgIntp)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#9471a4" stroke-width="1.2" opacity="0.5"/>

  <!-- Decorative inner ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#9471a4" stroke-width="1" opacity="0.25"/>

  <!-- Four quadrant dots — symbolic of 4-letter type -->
  <circle cx="100" cy="42"  r="3" fill="#9471a4" opacity="0.5"/>
  <circle cx="158" cy="100" r="3" fill="#9471a4" opacity="0.5"/>
  <circle cx="100" cy="158" r="3" fill="#9471a4" opacity="0.5"/>
  <circle cx="42"  cy="100" r="3" fill="#9471a4" opacity="0.5"/>

  <!-- Corner accent dots -->
  <circle cx="145" cy="55"  r="2" fill="#9471a4" opacity="0.3"/>
  <circle cx="145" cy="145" r="2" fill="#9471a4" opacity="0.3"/>
  <circle cx="55"  cy="145" r="2" fill="#9471a4" opacity="0.3"/>
  <circle cx="55"  cy="55"  r="2" fill="#9471a4" opacity="0.3"/>

  <!-- Cross lines (subtle) -->
  <line x1="100" y1="32" x2="100" y2="168" stroke="#9471a4" stroke-width="0.6" opacity="0.15"/>
  <line x1="32"  y1="100" x2="168" y2="100" stroke="#9471a4" stroke-width="0.6" opacity="0.15"/>

  <!-- "INTP" main text -->
  <text x="100" y="118"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="700"
        fill="#5e436b" opacity="0.92">INTP</text>

  <!-- "THE LOGICIAN" -->
  <text x="100" y="172"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="9.5" font-weight="600"
        letter-spacing="2.8"
        fill="#735283">THE LOGICIAN</text>
</svg>
