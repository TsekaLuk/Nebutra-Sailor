# Nebutra-Sailor Local Development Stack
# Run: docker-compose up -d

services:
  # ============================================
  # Infrastructure
  # ============================================

  # PostgreSQL (Supabase alternative for local dev)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nebutra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nebutra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./infra/supabase/policies.sql:/docker-entrypoint-initdb.d/02-policies.sql
      - ./infra/supabase/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Upstash alternative for local dev)
  redis:
    image: redis:7-alpine
    container_name: nebutra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse (warehouse for analytics + growth metrics)
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: nebutra-clickhouse
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native
    environment:
      - CLICKHOUSE_DB=nebutra
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================
  # Python Microservices
  # ============================================

  ai-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: ai
    container_name: nebutra-ai
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["ai", "core"]

  content-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: content
    container_name: nebutra-content
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["content", "core"]

  recsys-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: recsys
    container_name: nebutra-recsys
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["recsys", "core"]

  ecommerce-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: ecommerce
    container_name: nebutra-ecommerce
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
      - REDIS_URL=redis://redis:6379
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["ecommerce", "core"]

  web3-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: web3
    container_name: nebutra-web3
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
      - REDIS_URL=redis://redis:6379
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["web3"]

  billing-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: billing
    container_name: nebutra-billing
    ports:
      - "8006:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nebutra
      - REDIS_URL=redis://redis:6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_PRO_MONTHLY=${STRIPE_PRICE_ID_PRO_MONTHLY}
      - STRIPE_PRICE_ID_PRO_YEARLY=${STRIPE_PRICE_ID_PRO_YEARLY}
      - STRIPE_PRICE_ID_ENTERPRISE_MONTHLY=${STRIPE_PRICE_ID_ENTERPRISE_MONTHLY}
      - STRIPE_PRICE_ID_ENTERPRISE_YEARLY=${STRIPE_PRICE_ID_ENTERPRISE_YEARLY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["billing", "core"]

  event-ingest-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.python
      args:
        SERVICE: event-ingest
    container_name: nebutra-event-ingest
    ports:
      - "8008:8000"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=nebutra
      - DEDUPE_TTL_SECONDS=3600
    depends_on:
      clickhouse:
        condition: service_healthy
    profiles: ["analytics"]

  # ============================================
  # Observability (optional)
  # ============================================

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: nebutra-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    profiles:
      - observability

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  default:
    name: nebutra-network
