apiVersion: v1
kind: ConfigMap
metadata:
  name: nebutra-config
  namespace: nebutra
  labels:
    app.kubernetes.io/name: nebutra-config
    app.kubernetes.io/component: config
data:
  # ---------------------------------------------------------------------------
  # Runtime environment
  # Overlay kustomizations can patch these values per environment.
  # ---------------------------------------------------------------------------
  NODE_ENV: "production"
  PYTHON_ENV: "production"

  # ---------------------------------------------------------------------------
  # Public API endpoints (consumed by Next.js apps at build/runtime)
  # ---------------------------------------------------------------------------
  NEXT_PUBLIC_API_URL: "https://api.nebutra.com"
  NEXT_PUBLIC_APP_URL: "https://app.nebutra.com"
  NEXT_PUBLIC_LANDING_URL: "https://nebutra.com"

  # ---------------------------------------------------------------------------
  # Internal service discovery (ClusterIP service names within the namespace)
  # Services communicate over the K8s internal DNS:
  #   http://<service-name>.<namespace>.svc.cluster.local
  # ---------------------------------------------------------------------------
  AI_SERVICE_URL: "http://ai-service"
  BILLING_SERVICE_URL: "http://billing-service"
  CONTENT_SERVICE_URL: "http://content-service"
  ECOMMERCE_SERVICE_URL: "http://ecommerce-service"
  RECSYS_SERVICE_URL: "http://recsys-service"
  EVENT_INGEST_SERVICE_URL: "http://event-ingest-service"
  WEB3_SERVICE_URL: "http://web3-service"

  # ---------------------------------------------------------------------------
  # ClickHouse analytics database (non-secret connection settings)
  # The CLICKHOUSE_HOST and password are injected from app-secrets.
  # ---------------------------------------------------------------------------
  CLICKHOUSE_DATABASE: "nebutra"
  CLICKHOUSE_PORT: "8123"

  # ---------------------------------------------------------------------------
  # Logging
  # ---------------------------------------------------------------------------
  LOG_LEVEL: "info"

  # ---------------------------------------------------------------------------
  # Feature flags (non-sensitive defaults)
  # ---------------------------------------------------------------------------
  ENABLE_WEB3: "true"
  ENABLE_RECSYS: "true"
