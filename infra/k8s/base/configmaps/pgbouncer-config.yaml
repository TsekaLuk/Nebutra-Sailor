# PgBouncer connection pooler ConfigMap
#
# PgBouncer sits between all Node.js and Python services and Postgres (Supabase).
# It maintains a pool of long-lived Postgres connections and multiplexes many
# short-lived application connections onto them.
#
# Mode: transaction pooling (optimal for stateless services using Prisma/asyncpg)
#   - Each transaction gets a server connection; released immediately after COMMIT/ROLLBACK
#   - Allows 10-20× more app connections than Postgres connection limit
#
# Deployment: PgBouncer runs as a Kubernetes Deployment in the nebutra namespace.
# Services connect to pgbouncer:5432, NOT directly to Supabase.
#
# DATABASE_URL format for apps:
#   postgresql://user:pass@pgbouncer:5432/db?pgbouncer=true&connection_limit=1
#   (connection_limit=1 tells Prisma to use one connection per instance)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: nebutra
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database
data:
  pgbouncer.ini: |
    [databases]
    ; Route "nebutra" database alias to Supabase (real host in Secret)
    nebutra = host=$(PGHOST) port=5432 dbname=$(PGDATABASE)

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432

    ; Authentication
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt

    ; Pool mode — transaction is best for Prisma/asyncpg
    pool_mode = transaction

    ; Pool sizing
    ; max_client_conn: maximum simultaneous application connections
    ; default_pool_size: server connections per (db, user) pair
    max_client_conn = 1000
    default_pool_size = 20
    min_pool_size = 5
    reserve_pool_size = 5
    reserve_pool_timeout = 3

    ; Timeouts
    server_connect_timeout = 5
    server_idle_timeout = 600
    server_lifetime = 3600
    client_idle_timeout = 60
    query_timeout = 30
    query_wait_timeout = 10

    ; Connection limits per user
    max_user_connections = 100
    max_db_connections = 50

    ; Admin interface
    admin_users = pgbouncer_admin
    stats_users = pgbouncer_stats
    stats_period = 60

    ; Logging
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    verbose = 0

    ; TLS to Supabase
    server_tls_sslmode = require
    server_tls_protocols = secure
    client_tls_sslmode = disable  ; TLS terminated at ingress

    ; Avoid prepared statements incompatibility with transaction pooling
    ignore_startup_parameters = extra_float_digits,options
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: nebutra
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database
spec:
  replicas: 2   # HA: two instances, app connects via Service (round-robin)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/component: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9127"
    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight transactions to complete
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1.23.1
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGBOUNCER_DATABASE
              value: nebutra
            - name: PGBOUNCER_POOL_MODE
              value: transaction
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "1000"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "20"
            - name: POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PGHOST
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PGDATABASE
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PGUSER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PGPASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10

        # Prometheus exporter sidecar for PgBouncer metrics
        - name: pgbouncer-exporter
          image: prometheuscommunity/pgbouncer-exporter:v0.7.0
          args:
            - --pgBouncer.connectionString=postgres://pgbouncer_stats:$(STATS_PASSWORD)@localhost:5432/pgbouncer?sslmode=disable
          env:
            - name: STATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PGBOUNCER_STATS_PASSWORD
          ports:
            - name: metrics
              containerPort: 9127
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      securityContext:
        fsGroup: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: nebutra
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pgbouncer
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
    - name: metrics
      port: 9127
      targetPort: metrics
---
# PodDisruptionBudget — keep at least 1 PgBouncer alive during node drain
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: nebutra
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
