apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page
  namespace: nebutra
  labels:
    app.kubernetes.io/name: landing-page
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: landing-page
  template:
    metadata:
      labels:
        app.kubernetes.io/name: landing-page
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: landing-page
      terminationGracePeriodSeconds: 30
      containers:
        - name: landing-page
          # CI pipeline overrides this tag via kustomize image transforms
          image: nebutra/landing-page:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nebutra-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
      securityContext:
        fsGroup: 1000
