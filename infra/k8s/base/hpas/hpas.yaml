# HorizontalPodAutoscalers — CPU-based autoscaling for all stateless services.
#
# Scale-up:   fast (30 s stabilization, +100% or +2 pods per window)
# Scale-down: conservative (300 s stabilization, −50% per window) to prevent
#             thrashing during bursty traffic.
#
# Target utilization of 70% CPU leaves headroom for traffic spikes before the
# next scale-out event lands.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: nebutra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
