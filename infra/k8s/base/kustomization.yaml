apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nebutra

resources:
  # Namespace must come first so subsequent resources land in the right namespace
  - namespace.yaml

  # ConfigMaps — non-secret environment configuration
  - configmaps/nebutra-config.yaml
  # PgBouncer connection pooler (Deployment + Service + PDB + ConfigMap)
  - configmaps/pgbouncer-config.yaml

  # Deployments — one per service
  - deployments/web.yaml
  - deployments/landing-page.yaml
  - deployments/api-gateway.yaml
  - deployments/ai-service.yaml
  - deployments/billing-service.yaml
  - deployments/content-service.yaml
  - deployments/ecommerce-service.yaml
  - deployments/recsys-service.yaml
  - deployments/event-ingest-service.yaml
  - deployments/web3-service.yaml
  - deployments/studio.yaml

  # Services — ClusterIP, one per deployment
  - services/web.yaml
  - services/landing-page.yaml
  - services/api-gateway.yaml
  - services/ai-service.yaml
  - services/billing-service.yaml
  - services/content-service.yaml
  - services/ecommerce-service.yaml
  - services/recsys-service.yaml
  - services/event-ingest-service.yaml
  - services/web3-service.yaml
  - services/studio.yaml

  # Ingress — nginx, with TLS via cert-manager
  - ingress/nginx-ingress.yaml

  # Network policies — default-deny + selective allow rules
  - network-policies/default-deny.yaml
  # Inter-service communication allow rules (zero-trust mesh)
  - network-policies/inter-service.yaml

  # PodDisruptionBudgets — min availability during node maintenance
  - pdbs/pdbs.yaml

  # HorizontalPodAutoscalers — CPU-based autoscaling for stateless services
  - hpas/hpas.yaml

  # VerticalPodAutoscalers — resource right-sizing recommendations (mode: Off)
  # Requires VPA operator: https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
  # Switch updateMode to "Auto" only after migrating HPA to custom metrics (KEDA)
  - vpas/vpas.yaml

  # Prometheus ServiceMonitors + alerting rules
  # Requires kube-prometheus-stack: helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack
  - monitoring/service-monitors.yaml
  # SLO burn-rate multi-window alerts (Google SRE Workbook methodology)
  - monitoring/slo-rules.yaml

  # ResourceQuota + LimitRange — cap total namespace CPU/memory/pod consumption
  # and inject default requests/limits for containers that omit them.
  - quotas/resource-quota.yaml

  # Kyverno ClusterPolicies — pod security, image hygiene, resource enforcement.
  # Requires Kyverno operator: kubectl apply -f https://github.com/kyverno/kyverno/releases/latest/download/install.yaml
  # All policies run in Audit mode — switch validationFailureAction to Enforce after verification.
  - policies/kyverno-policies.yaml

  # Secrets — External Secrets Operator CRDs (ClusterSecretStore + ExternalSecret)
  # Operator install: helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
  - secrets/external-secrets.yaml

  # RBAC — ServiceAccounts + least-privilege Roles + RoleBindings per workload
  - rbac/service-accounts.yaml
  - rbac/roles.yaml

commonLabels:
  app.kubernetes.io/part-of: nebutra-sailor
  app.kubernetes.io/managed-by: kustomize
