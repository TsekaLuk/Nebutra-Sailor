# OpenTelemetry Collector — deployed in the monitoring namespace
#
# Receives traces from all Nebutra services (OTLP gRPC :4317, HTTP :4318)
# and exports them to:
#   - Jaeger (trace backend for development/staging)
#   - Tempo (production trace backend via Grafana Cloud)
#   - Prometheus (metrics pipeline, via prometheusremotewrite)
#
# Requires:
#   kubectl create namespace monitoring
#   OpenTelemetry Operator (optional, can also deploy as raw Deployment)
#
# Install OTel Operator:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm install opentelemetry-operator open-telemetry/opentelemetry-operator \
#     --namespace monitoring --create-namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/component: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Pull Prometheus metrics from Kubernetes pods
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector-self
              static_configs:
                - targets: [localhost:8888]

    processors:
      # Batch traces for efficiency — reduces export calls
      batch:
        timeout: 5s
        send_batch_size: 512
        send_batch_max_size: 1024

      # Add Kubernetes metadata (pod, namespace, node) to every span
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.deployment.name
          labels:
            - tag_name: app
              key: app.kubernetes.io/name
              from: pod
            - tag_name: version
              key: app.kubernetes.io/version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

      # Resource detection — adds cloud provider, host, OS attributes
      resourcedetection:
        detectors: [env, k8s_node, system]
        timeout: 2s

      # Memory limiter — prevents OOM kill on traffic spikes
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 20

      # Sampling — keep 100% of errors, 10% of healthy traces
      tail_sampling:
        decision_wait: 10s
        num_traces: 100000
        expected_new_traces_per_sec: 1000
        policies:
          - name: errors-policy
            type: status_code
            status_code: { status_codes: [ERROR] }
          - name: slow-traces-policy
            type: latency
            latency: { threshold_ms: 1000 }
          - name: probabilistic-policy
            type: probabilistic
            probabilistic: { sampling_percentage: 10 }

    exporters:
      # Jaeger (self-hosted, for dev/staging)
      otlp/jaeger:
        endpoint: jaeger-collector.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # Grafana Tempo (production) — set TEMPO_ENDPOINT + TEMPO_TOKEN in Secret
      otlp/tempo:
        endpoint: ${env:TEMPO_ENDPOINT}
        headers:
          Authorization: "Bearer ${env:TEMPO_TOKEN}"
        tls:
          insecure: false

      # Prometheus remote write — push metrics to Thanos/Cortex/Mimir
      prometheusremotewrite:
        endpoint: ${env:PROMETHEUS_REMOTE_WRITE_URL}
        headers:
          X-Scope-OrgID: nebutra

      # Debug exporter (disabled in production — set verbosity: basic for dev)
      debug:
        verbosity: normal
        sampling_initial: 2
        sampling_thereafter: 500

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, tail_sampling, batch]
          exporters: [otlp/jaeger, otlp/tempo]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [debug]

      telemetry:
        metrics:
          address: 0.0.0.0:8888
        logs:
          level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/component: observability
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/component: observability
    spec:
      serviceAccountName: otel-collector
      terminationGracePeriodSeconds: 30
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.103.0
          args: ["--config=/conf/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          envFrom:
            - secretRef:
                name: otel-collector-secrets
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
      securityContext:
        fsGroup: 10001
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-collector
  namespace: monitoring
  labels:
    app.kubernetes.io/name: opentelemetry-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opentelemetry-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 8888
      targetPort: metrics
---
# ServiceAccount with RBAC to read pod metadata for k8sattributes processor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions]
    resources: [ingresses]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring
