---
# event-ingest-service — accepts from api-gateway only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-event-ingest
  namespace: nebutra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: event-ingest-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8000
---
# Prometheus scraper → all services (metrics collection)
# The monitoring namespace hosts kube-prometheus-stack.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: nebutra
spec:
  podSelector: {}    # all pods in nebutra namespace
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 8000
---
# OpenTelemetry collector → all services can push traces (egress from services)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otel-egress
  namespace: nebutra
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317    # OTLP gRPC
        - protocol: TCP
          port: 4318    # OTLP HTTP
---
# Allow all pods to reach external HTTPS services (Stripe, Clerk, OpenAI, Sentry, etc.)
# Scoped to port 443 only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-https-egress
  namespace: nebutra
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
    - ports:
        - protocol: TCP
          port: 5432    # PostgreSQL (Supabase)
    - ports:
        - protocol: TCP
          port: 6379    # Redis / Upstash
