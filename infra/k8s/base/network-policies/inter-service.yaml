# Inter-service NetworkPolicy rules
#
# Principle: only allow the minimum traffic each service legitimately needs.
# Combined with default-deny.yaml (which blocks all by default), these rules
# form a zero-trust network boundary inside the nebutra namespace.
#
# Legend for ports:
#   3000 — web (Next.js)
#   3001 — landing-page (Next.js)
#   3002 — api-gateway (Hono)
#   3003 — studio (Sanity)
#   8000 — Python microservices (FastAPI)
---
# Web app → api-gateway (SSR server-side fetches)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-to-api-gateway
  namespace: nebutra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
      ports:
        - protocol: TCP
          port: 3002
---
# api-gateway → AI service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-ai
  namespace: nebutra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8000
---
# api-gateway → billing-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-billing
  namespace: nebutra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: billing-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8000
---
# api-gateway → content-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-content
  namespace: nebutra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: content-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8000
---
# api-gateway → recsys-service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-to-recsys
  namespace: nebutra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: recsys-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
