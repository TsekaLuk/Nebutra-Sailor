# PodDisruptionBudgets — ensure minimum availability during node maintenance,
# rolling updates, and cluster upgrades.
#
# Rule: any workload with replicas >= 2 gets minAvailable: 1.
# This allows a rolling drain of one node without taking the service offline.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: nebutra
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: nebutra
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
