# =============================================================================
# ServiceAccounts — one per workload, bound to least-privilege roles.
# Pods reference these via spec.serviceAccountName.
# automountServiceAccountToken: false prevents the Kubernetes API token from
# being injected unless explicitly needed.
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: nebutra
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: nebutra-sailor
automountServiceAccountToken: false

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  namespace: nebutra
  labels:
