# =============================================================================
# Secret Management for Nebutra
# =============================================================================
#
# OPTION A — kubectl (quick-start / CI without ExternalSecrets operator)
# -----------------------------------------------------------------------------
# Create the secret manually or via a CI step. Never commit actual values.
#
#   kubectl create secret generic app-secrets \
#     --namespace nebutra \
#     --from-literal=DATABASE_URL="postgresql://user:pass@host:5432/nebutra" \
#     --from-literal=REDIS_URL="redis://:pass@host:6379/0" \
#     --from-literal=JWT_SECRET="<random-256-bit-hex>" \
#     --from-literal=NEXTAUTH_SECRET="<random-256-bit-hex>" \
#     --from-literal=NEXTAUTH_URL="https://app.nebutra.com" \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --from-literal=STRIPE_SECRET_KEY="sk_live_..." \
#     --from-literal=STRIPE_WEBHOOK_SECRET="whsec_..." \
#     --from-literal=CLICKHOUSE_HOST="https://clickhouse.host:8123" \
#     --from-literal=CLICKHOUSE_PASSWORD="<password>" \
#     --from-literal=WEB3_RPC_URL="https://mainnet.infura.io/v3/<key>" \
#     --from-literal=WEB3_PRIVATE_KEY="0x..."
#
# =============================================================================
#
# OPTION B — External Secrets Operator (recommended for production)
# -----------------------------------------------------------------------------
# Install the operator: https://external-secrets.io/latest/introduction/getting-started/
#
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Then apply a ClusterSecretStore (or SecretStore) pointing to your provider
# (AWS Secrets Manager, GCP Secret Manager, HashiCorp Vault, etc.) and
# uncomment / adapt the ExternalSecret below.
#
# =============================================================================

---
# ExternalSecret example — AWS Secrets Manager backend.
# Uncomment and adapt once the External Secrets Operator is installed and a
# ClusterSecretStore named "aws-secrets-manager" is configured.
#
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: app-secrets
#   namespace: nebutra
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager   # ClusterSecretStore name
#     kind: ClusterSecretStore
#   target:
#     name: app-secrets           # K8s Secret name that pods reference
#     creationPolicy: Owner
#   data:
#     - secretKey: DATABASE_URL
#       remoteRef:
#         key: nebutra/prod/database-url
#     - secretKey: REDIS_URL
#       remoteRef:
#         key: nebutra/prod/redis-url
#     - secretKey: JWT_SECRET
#       remoteRef:
#         key: nebutra/prod/jwt-secret
#     - secretKey: NEXTAUTH_SECRET
#       remoteRef:
#         key: nebutra/prod/nextauth-secret
#     - secretKey: NEXTAUTH_URL
#       remoteRef:
#         key: nebutra/prod/nextauth-url
#     - secretKey: OPENAI_API_KEY
#       remoteRef:
#         key: nebutra/prod/openai-api-key
#     - secretKey: ANTHROPIC_API_KEY
#       remoteRef:
#         key: nebutra/prod/anthropic-api-key
#     - secretKey: STRIPE_SECRET_KEY
#       remoteRef:
#         key: nebutra/prod/stripe-secret-key
#     - secretKey: STRIPE_WEBHOOK_SECRET
#       remoteRef:
#         key: nebutra/prod/stripe-webhook-secret
#     - secretKey: CLICKHOUSE_HOST
#       remoteRef:
#         key: nebutra/prod/clickhouse-host
#     - secretKey: CLICKHOUSE_PASSWORD
#       remoteRef:
#         key: nebutra/prod/clickhouse-password
#     - secretKey: WEB3_RPC_URL
#       remoteRef:
#         key: nebutra/prod/web3-rpc-url
#     - secretKey: WEB3_PRIVATE_KEY
#       remoteRef:
#         key: nebutra/prod/web3-private-key
