# =============================================================================
# External Secrets Operator — production secret synchronisation
# =============================================================================
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets-system --create-namespace \
#     --set installCRDs=true
#
# Set the backend by labelling the ClusterSecretStore (see below).
# Only ONE provider block should be active at a time.
# =============================================================================

---
# ── IAM credentials for the ESO controller ────────────────────────────────────
# Store the AWS key pair in a K8s secret BEFORE applying this file:
#
#   kubectl create secret generic aws-eso-credentials \
#     --namespace external-secrets-system \
#     --from-literal=access-key-id="AKIA…" \
#     --from-literal=secret-access-key="…"
#
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: nebutra-aws-secrets-manager
  annotations:
    # Switch provider here — supported: aws | vault | gcp | azure
    # For non-AWS providers comment out the aws block and uncomment the relevant one.
    external-secrets.io/provider: aws
spec:
  provider:
    # ── AWS Secrets Manager ─────────────────────────────────────────────────
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-eso-credentials
            namespace: external-secrets-system
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-eso-credentials
            namespace: external-secrets-system
            key: secret-access-key

    # ── HashiCorp Vault (uncomment to switch) ──────────────────────────────
    # vault:
    #   server: "https://vault.nebutra.internal:8200"
    #   path: "secret"
    #   version: "v2"
    #   auth:
    #     kubernetes:
    #       mountPath: "kubernetes"
    #       role: "nebutra-app"
    #       serviceAccountRef:
    #         name: "external-secrets"
    #         namespace: "external-secrets-system"

---
# ── Main application secrets — synced to app-secrets K8s Secret ───────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: nebutra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: nebutra-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      # Optional: add annotations to the generated secret for auditing
      metadata:
        annotations:
          external-secrets.io/last-synced: "{{ .metadata.annotations.external-secrets.io/last-synced }}"
  data:
    # ── Database ─────────────────────────────────────────────────────────────
    - secretKey: DATABASE_URL
      remoteRef:
        key: nebutra/prod/database
        property: url
    - secretKey: DIRECT_URL
      remoteRef:
        key: nebutra/prod/database
        property: direct_url

    # ── Cache ─────────────────────────────────────────────────────────────────
    - secretKey: REDIS_URL
      remoteRef:
        key: nebutra/prod/redis
        property: url
    - secretKey: UPSTASH_REDIS_REST_URL
      remoteRef:
        key: nebutra/prod/redis
        property: upstash_rest_url
    - secretKey: UPSTASH_REDIS_REST_TOKEN
      remoteRef:
        key: nebutra/prod/redis
        property: upstash_rest_token

    # ── Auth ──────────────────────────────────────────────────────────────────
    - secretKey: JWT_SECRET
      remoteRef:
        key: nebutra/prod/auth
        property: jwt_secret
    - secretKey: CLERK_SECRET_KEY
      remoteRef:
        key: nebutra/prod/auth
        property: clerk_secret_key
    - secretKey: CLERK_WEBHOOK_SECRET
      remoteRef:
        key: nebutra/prod/auth
        property: clerk_webhook_secret

    # ── AI providers ──────────────────────────────────────────────────────────
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: nebutra/prod/ai
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: nebutra/prod/ai
        property: anthropic_api_key

    # ── Billing ───────────────────────────────────────────────────────────────
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: nebutra/prod/stripe
        property: secret_key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: nebutra/prod/stripe
        property: webhook_secret

    # ── Analytics ─────────────────────────────────────────────────────────────
    - secretKey: CLICKHOUSE_HTTP_URL
      remoteRef:
        key: nebutra/prod/clickhouse
        property: http_url
    - secretKey: CLICKHOUSE_USER
      remoteRef:
        key: nebutra/prod/clickhouse
        property: user
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: nebutra/prod/clickhouse
        property: password

    # ── Observability ──────────────────────────────────────────────────────────
    - secretKey: SENTRY_DSN
      remoteRef:
        key: nebutra/prod/observability
        property: sentry_dsn
    - secretKey: NEXT_PUBLIC_SENTRY_DSN
      remoteRef:
        key: nebutra/prod/observability
        property: sentry_dsn_public

    # ── Email ─────────────────────────────────────────────────────────────────
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: nebutra/prod/email
        property: resend_api_key

    # ── Admin ─────────────────────────────────────────────────────────────────
    - secretKey: ADMIN_API_KEY
      remoteRef:
        key: nebutra/prod/admin
        property: api_key

    # ── Background jobs ───────────────────────────────────────────────────────
    - secretKey: INNGEST_EVENT_KEY
      remoteRef:
        key: nebutra/prod/inngest
        property: event_key
    - secretKey: INNGEST_SIGNING_KEY
      remoteRef:
        key: nebutra/prod/inngest
        property: signing_key

    # ── Web3 ──────────────────────────────────────────────────────────────────
    - secretKey: WEB3_RPC_URL
      remoteRef:
        key: nebutra/prod/web3
        property: rpc_url
    - secretKey: WEB3_PRIVATE_KEY
      remoteRef:
        key: nebutra/prod/web3
        property: private_key

---
# ── Staging variant — lower refresh rate, separate AWS path ─────────────────
