apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: nebutra
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-service
  ports:
    - name: http
      port: 80
      # ai-service container listens on 8001
      targetPort: http
      protocol: TCP
