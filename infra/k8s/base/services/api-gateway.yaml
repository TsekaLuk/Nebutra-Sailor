apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nebutra
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 80
      # api-gateway container listens on 3002
      targetPort: http
      protocol: TCP
