apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service
  namespace: nebutra
  labels:
    app.kubernetes.io/name: ecommerce-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ecommerce-service
  ports:
    - name: http
      port: 80
      # ecommerce-service container listens on 8004
      targetPort: http
      protocol: TCP
