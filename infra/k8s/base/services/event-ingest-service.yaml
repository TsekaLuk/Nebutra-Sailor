apiVersion: v1
kind: Service
metadata:
  name: event-ingest-service
  namespace: nebutra
  labels:
    app.kubernetes.io/name: event-ingest-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: event-ingest-service
  ports:
    - name: http
      port: 80
      # event-ingest-service container listens on 8008
      targetPort: http
      protocol: TCP
