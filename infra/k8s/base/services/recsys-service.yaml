apiVersion: v1
kind: Service
metadata:
  name: recsys-service
  namespace: nebutra
  labels:
    app.kubernetes.io/name: recsys-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: recsys-service
  ports:
    - name: http
      port: 80
      # recsys-service container listens on 8003
      targetPort: http
      protocol: TCP
