# VerticalPodAutoscaler resources
#
# Prerequisites:
#   kubectl apply -f https://github.com/kubernetes/autoscaler/releases/latest/download/vertical-pod-autoscaler.yaml
#
# Mode: "Off" — VPA computes recommendations but does NOT evict/resize pods.
# Switch to "Auto" in production after observing recommendations for ≥ 7 days.
# Rationale: VPA "Auto" and HPA CPU-based scaling conflict; keep VPA in "Off"
#            until we migrate HPA to scale on custom metrics (KEDA).
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-web
  namespace: nebutra
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: web
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 2
          memory: 2Gi
        controlledResources: ["cpu", "memory"]
---
