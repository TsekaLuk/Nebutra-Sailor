apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nebutra-prod

resources:
  - ../../base

# Prefix all resource names with "prod-" to disambiguate in multi-env clusters
namePrefix: prod-

commonLabels:
  environment: production

# ---------------------------------------------------------------------------
# Strategic-merge patches applied on top of base manifests
# ---------------------------------------------------------------------------
patches:
  # Scale up api-gateway and web to 3 replicas; ai-service stays at 2
  - path: patches/replicas.yaml
    target:
      kind: Deployment
  # Increase CPU/memory ceilings for production workloads
  - path: patches/resources.yaml
    target:
      kind: Deployment

# ---------------------------------------------------------------------------
# Image tag override — CI replaces :latest with the immutable SHA tag
# Example (set in CI):
#   kustomize edit set image nebutra/web=nebutra/web:abc1234
# ---------------------------------------------------------------------------
