spec:
  template:
    spec:
      containers:
        - name: recsys-service
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

---
# billing-service — financial service; extra memory for reliability under load
apiVersion: apps/v1
kind: Deployment
metadata:
