# =============================================================================
# Nebutra Common Proxy Parameters
# Included by: each `location` block in nginx.conf and nginx-china.conf
#
# Usage inside a location block:
#   include /etc/nginx/conf.d/proxy_params.conf;
#   proxy_pass http://upstream_name;
# =============================================================================

# Use HTTP/1.1 to support keepalive connections to upstream
proxy_http_version 1.1;

# Required for keepalive: clear Connection header so it is not forwarded
proxy_set_header Connection "";

# ---------------------------------------------------------------------------
# Real client IP forwarding
# These headers tell the upstream application who the actual client is,
# even when the request passes through Nginx (and optionally a CDN before it).
# ---------------------------------------------------------------------------

# Original client IP (single value, set to $remote_addr)
proxy_set_header X-Real-IP $remote_addr;

# Full proxy chain — upstream should use the first value as the client IP
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

# Protocol used by the browser (http or https)
proxy_set_header X-Forwarded-Proto $scheme;

# Original Host header as seen by Nginx (e.g. app.nebutra.com)
proxy_set_header Host $http_host;

# ---------------------------------------------------------------------------
# Request tracing / correlation
# Allows each upstream service to correlate logs across the stack.
# The upstream must read and propagate X-Request-ID.
# ---------------------------------------------------------------------------
proxy_set_header X-Request-ID $request_id;

# ---------------------------------------------------------------------------
# Default timeouts
# Override in individual server/location blocks for long-running operations.
# ---------------------------------------------------------------------------
proxy_connect_timeout 10s;
proxy_send_timeout    30s;
proxy_read_timeout    60s;

# ---------------------------------------------------------------------------
# Buffering
# Disable proxy buffering for real-time / streaming responses.
# For standard pages keep buffering on (default) for performance.
# ---------------------------------------------------------------------------
proxy_buffering on;
proxy_buffer_size 16k;
proxy_buffers 8 16k;
proxy_busy_buffers_size 32k;

# ---------------------------------------------------------------------------
# Error handling
# Pass upstream HTTP error responses back to the client as-is.
# Comment this out if you want Nginx to serve its own error pages instead.
# ---------------------------------------------------------------------------
proxy_intercept_errors off;
