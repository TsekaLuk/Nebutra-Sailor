# =============================================================================
# Nebutra Nginx Security Configuration Fragment
# Included by: nginx.conf and nginx-china.conf via `include conf.d/security.conf;`
#
# This file lives in the http{} context (NOT inside a server{} block).
# It sets global security defaults. Per-server overrides (e.g. X-Frame-Options)
# are set directly in each server block.
# =============================================================================

# ---------------------------------------------------------------------------
# Hide Nginx version from Server response header
# ---------------------------------------------------------------------------
server_tokens off;

# ---------------------------------------------------------------------------
# Default security headers applied to all server blocks.
#
# NOTE: Headers added here in the http{} context ONLY take effect if the
# server block does not also set headers with add_header. Because Nginx
# add_header inheritance stops when any child block adds a header, you
# should duplicate these in each server block OR use the headers-more
# module (ngx_http_headers_more_filter_module) for unconditional injection.
#
# The headers below serve as documentation of required values. Each server
# block in nginx.conf individually sets the critical headers to guarantee
# they are always sent.
# ---------------------------------------------------------------------------

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Deny embedding in frames (prevents clickjacking)
# Override per server block: app.nebutra.com uses DENY; others may use SAMEORIGIN
add_header X-Frame-Options "DENY" always;

# Legacy XSS filter for older browsers
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict browser feature access
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# ---------------------------------------------------------------------------
# Content Security Policy (CSP)
#
# This is a TEMPLATE. Adjust each directive for your actual asset origins.
#
# Placeholders to replace before production:
#   <CDN_DOMAIN>       — your CDN hostname, e.g. cdn.nebutra.com
#   <ANALYTICS_DOMAIN> — analytics script host, e.g. plausible.io or us.posthog.com
#   <MAPS_DOMAIN>      — if using maps (remove if not applicable)
#
# Start with report-only mode during rollout:
#   Content-Security-Policy-Report-Only "..."
# Then switch to enforcing once violations are resolved.
# ---------------------------------------------------------------------------
# add_header Content-Security-Policy "
#     default-src 'self';
#     script-src 'self' 'unsafe-inline' 'unsafe-eval'
#         https://<CDN_DOMAIN>
#         https://<ANALYTICS_DOMAIN>;
#     style-src 'self' 'unsafe-inline'
#         https://<CDN_DOMAIN>
#         https://fonts.googleapis.com;
#     font-src 'self'
#         https://<CDN_DOMAIN>
#         https://fonts.gstatic.com;
#     img-src 'self' data: blob:
#         https://<CDN_DOMAIN>;
#     connect-src 'self'
#         https://api.nebutra.com
#         wss://app.nebutra.com
#         https://<ANALYTICS_DOMAIN>;
#     frame-ancestors 'none';
#     base-uri 'self';
#     form-action 'self';
#     upgrade-insecure-requests;
# " always;

# ---------------------------------------------------------------------------
# Cross-Origin policies (modern browser isolation)
# ---------------------------------------------------------------------------
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# ---------------------------------------------------------------------------
# DNS prefetch control
# Prevent leaking navigation to third parties via prefetch
# ---------------------------------------------------------------------------
add_header X-DNS-Prefetch-Control "off" always;
