# =============================================================================
# Nebutra Production Nginx Configuration — China (ICP 备案) Variant
# Target: Alibaba Cloud ECS (阿里云) / Tencent Cloud CVM (腾讯云)
#
# KEY DIFFERENCES from nginx.conf:
#   1. HSTS removed — ICP filing process sometimes requires plain HTTP access
#      during government review. Re-enable after filing is approved.
#   2. Cloudflare CDN replaced with Alibaba Cloud CDN / Tencent Cloud CDN
#      real IP restoration via X-Forwarded-For header parsing.
#   3. DNS resolvers point to domestic resolvers (AliDNS, DNSPod).
#   4. OCSP stapling uses China-accessible resolvers.
#
# IMPORTANT — ICP 备案 (Internet Content Provider Filing):
#   All domain names serving content to mainland China users MUST have an
#   active ICP filing (备案) from MIIT (工业和信息化部). Without it, your
#   hosting provider will block port 80/443.
#
#   Filing process: https://beian.miit.gov.cn/
#   Typically takes 14–28 working days.
#   Tencent Cloud guide: https://cloud.tencent.com/document/product/243
#   Alibaba Cloud guide: https://help.aliyun.com/product/35468.html
#
# IMPORTANT — PSB (公安) Filing:
#   After ICP filing, file with the Ministry of Public Security within 30 days:
#   https://www.beian.gov.cn/
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    keepalive_timeout  65;
    keepalive_requests 1000;
    client_max_body_size 50m;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ---------------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        image/svg+xml
        font/truetype
        font/opentype;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/s;
    limit_req_status 429;

    # ---------------------------------------------------------------------------
    # Alibaba Cloud CDN / Tencent Cloud CDN — Real IP Restoration
    #
    # When traffic passes through Chinese CDN, the originating client IP is
    # available in X-Forwarded-For. Set real_ip_from to your CDN's egress IP
    # ranges and use X-Forwarded-For as the real IP source.
    #
    # Alibaba Cloud CDN egress IPs: https://help.aliyun.com/document_detail/40205.html
    # Tencent Cloud CDN egress IPs: https://cloud.tencent.com/document/product/228/6927
    #
    # Replace the placeholder ranges below with the current published CIDR lists.
    # ---------------------------------------------------------------------------

    # --- Alibaba Cloud CDN egress ranges (PLACEHOLDER — update from official docs) ---
    # set_real_ip_from 47.246.0.0/15;
    # set_real_ip_from 140.205.0.0/16;
    # set_real_ip_from 203.107.0.0/17;
    # set_real_ip_from 120.78.0.0/15;

    # --- Tencent Cloud CDN egress ranges (PLACEHOLDER — update from official docs) ---
    # set_real_ip_from 119.147.0.0/16;
    # set_real_ip_from 182.254.0.0/16;
    # set_real_ip_from 183.3.0.0/17;

    # Uncomment the lines above AND the line below when CDN is configured:
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;

    # ---------------------------------------------------------------------------
    # Upstream definitions
    # Same as nginx.conf — adjust server addresses for your Docker/VM setup
    # ---------------------------------------------------------------------------
    upstream nebutra_web {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    upstream nebutra_landing {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    upstream nebutra_api {
        server 127.0.0.1:3002;
        keepalive 32;
    }

    upstream nebutra_ai {
        server 127.0.0.1:8001;
        keepalive 16;
    }

    upstream nebutra_content {
        server 127.0.0.1:8002;
        keepalive 16;
    }

    upstream nebutra_recsys {
        server 127.0.0.1:8003;
        keepalive 16;
    }

    upstream nebutra_ecommerce {
        server 127.0.0.1:8004;
        keepalive 16;
    }

    upstream nebutra_web3 {
        server 127.0.0.1:8005;
        keepalive 16;
    }

    upstream nebutra_billing {
        server 127.0.0.1:8006;
        keepalive 16;
    }

    upstream nebutra_event_ingest {
        server 127.0.0.1:8008;
        keepalive 16;
    }

    include /etc/nginx/conf.d/security.conf;

    # ===========================================================================
    # SERVER BLOCK 1: HTTP → HTTPS redirect
    #
    # NOTE ON HSTS: HSTS is intentionally OMITTED in this China variant.
    # During ICP filing review the regulator may access the site over HTTP.
    # Once filing is approved and stable, add HSTS back:
    #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # ===========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge for cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===========================================================================
    # SERVER BLOCK 2: www redirect
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name www.nebutra.com;

        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling using domestic resolvers (AliDNS + DNSPod)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 223.5.5.5 119.29.29.29 valid=300s;
        resolver_timeout 5s;

        # NO HSTS — see note above
        return 301 https://nebutra.com$request_uri;
    }

    # ===========================================================================
    # SERVER BLOCK 3: nebutra.com (landing page)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name nebutra.com;

        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 223.5.5.5 119.29.29.29 valid=300s;
        resolver_timeout 5s;

        # NO HSTS

        limit_req zone=general_limit burst=50 nodelay;

        location / {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_landing;
            add_header Cache-Control "public, s-maxage=300, stale-while-revalidate=60" always;
        }

        location /_next/static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_landing;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_landing;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
    }

    # ===========================================================================
    # SERVER BLOCK 4: app.nebutra.com (SaaS app)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.nebutra.com;

        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 223.5.5.5 119.29.29.29 valid=300s;
        resolver_timeout 5s;

        # NO HSTS

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        limit_req zone=general_limit burst=100 nodelay;

        location / {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            add_header Cache-Control "private, no-store" always;
        }

        location ~ ^/(api/auth|login|register|forgot-password|reset-password) {
            limit_req zone=auth_limit burst=10 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
        }

        location /_next/static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /ws {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
    }

    # ===========================================================================
    # SERVER BLOCK 5: api.nebutra.com (API Gateway)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.nebutra.com;

        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 223.5.5.5 119.29.29.29 valid=300s;
        resolver_timeout 5s;

        # NO HSTS

        limit_req zone=api_limit burst=200 nodelay;

        add_header Access-Control-Allow-Origin "https://app.nebutra.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Api-Version" always;
        add_header Access-Control-Max-Age "86400" always;

        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }

            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_api;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        location /webhooks/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_api;
            proxy_read_timeout 30s;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
    }
}
