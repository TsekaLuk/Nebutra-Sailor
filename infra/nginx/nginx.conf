# =============================================================================
# Nebutra Production Nginx Configuration
# Target: VM-based deployment (Alibaba Cloud ECS / Tencent Cloud CVM / Any Linux VM)
#
# Prerequisites:
#   - Nginx 1.20+
#   - SSL certificate at /etc/ssl/nebutra/{fullchain,privkey}.pem
#   - All Nebutra services running on localhost (or via Docker network)
#
# Usage:
#   nginx -t                          # Test config
#   nginx -s reload                   # Reload without downtime
#   systemctl reload nginx            # Systemd reload
# =============================================================================

# ---------------------------------------------------------------------------
# Worker settings
# ---------------------------------------------------------------------------
user nginx;
worker_processes auto;                   # One worker per CPU core
worker_rlimit_nofile 65536;             # Match OS ulimit -n

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;                           # Linux-optimized I/O model
    multi_accept on;
}

http {
    # ---------------------------------------------------------------------------
    # Basic settings
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;                   # Hide Nginx version (see also conf.d/security.conf)
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    keepalive_timeout  65;
    keepalive_requests 1000;
    client_max_body_size 50m;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        image/svg+xml
        font/truetype
        font/opentype;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    # API endpoints: 100 requests/second per IP, 10MB zone (~160k IPs)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # General web pages: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # Aggressive limiter for auth endpoints (login, register, forgot-password)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    limit_req_status 429;

    # ---------------------------------------------------------------------------
    # Upstream definitions
    # NOTE: When running via docker-compose, replace 127.0.0.1 with service names
    #       e.g., server web:3000; (Docker internal DNS)
    #       When running on bare VM with host-network or port mapping, use 127.0.0.1.
    # ---------------------------------------------------------------------------

    # Next.js SaaS application
    upstream nebutra_web {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # Next.js marketing / landing page
    upstream nebutra_landing {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    # Node.js API Gateway
    upstream nebutra_api {
        server 127.0.0.1:3002;
        keepalive 32;
    }

    # Python FastAPI microservices (internal — not directly exposed via public DNS)
    upstream nebutra_ai {
        server 127.0.0.1:8001;
        keepalive 16;
    }

    upstream nebutra_content {
        server 127.0.0.1:8002;
        keepalive 16;
    }

    upstream nebutra_recsys {
        server 127.0.0.1:8003;
        keepalive 16;
    }

    upstream nebutra_ecommerce {
        server 127.0.0.1:8004;
        keepalive 16;
    }

    upstream nebutra_web3 {
        server 127.0.0.1:8005;
        keepalive 16;
    }

    upstream nebutra_billing {
        server 127.0.0.1:8006;
        keepalive 16;
    }

    upstream nebutra_event_ingest {
        server 127.0.0.1:8008;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Include shared configuration fragments
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/security.conf;

    # ===========================================================================
    # SERVER BLOCK 1: HTTP → HTTPS redirect (all hosts)
    # ===========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Support Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===========================================================================
    # SERVER BLOCK 2: www.nebutra.com → nebutra.com (HTTPS redirect)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name www.nebutra.com;

        # --- SSL ---
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS (max-age=2 years)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        return 301 https://nebutra.com$request_uri;
    }

    # ===========================================================================
    # SERVER BLOCK 3: nebutra.com (marketing / landing page)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name nebutra.com;

        # --- SSL ---
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # General rate limit for landing page
        limit_req zone=general_limit burst=50 nodelay;

        # --- Proxy to landing page ---
        location / {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_landing;

            # Cache control for marketing pages (no sensitive data)
            add_header Cache-Control "public, s-maxage=300, stale-while-revalidate=60" always;
        }

        # Next.js static assets — long-term cache
        location /_next/static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_landing;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # Public folder assets
        location /static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_landing;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # Block certbot challenge if needed (redirect to root handles the rest)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
    }

    # ===========================================================================
    # SERVER BLOCK 4: app.nebutra.com (SaaS application)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.nebutra.com;

        # --- SSL ---
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers (app-specific)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # General rate limit
        limit_req zone=general_limit burst=100 nodelay;

        # --- Main application proxy ---
        location / {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;

            # No caching for authenticated app routes
            add_header Cache-Control "private, no-store" always;
        }

        # --- Auth endpoints: stricter rate limit ---
        location ~ ^/(api/auth|login|register|forgot-password|reset-password) {
            limit_req zone=auth_limit burst=10 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
        }

        # --- Next.js static assets: long-term cache (content-hashed filenames) ---
        location /_next/static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # --- Public static assets ---
        location /static/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # --- WebSocket support (Next.js HMR in dev; real-time features in prod) ---
        location /_next/webpack-hmr {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # --- WebSocket endpoint for real-time features ---
        location /ws {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
    }

    # ===========================================================================
    # SERVER BLOCK 5: api.nebutra.com (API Gateway)
    # ===========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.nebutra.com;

        # --- SSL ---
        ssl_certificate     /etc/ssl/nebutra/fullchain.pem;
        ssl_certificate_key /etc/ssl/nebutra/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # --- API rate limiting: 100 req/s, burst 200 ---
        limit_req zone=api_limit burst=200 nodelay;

        # --- CORS headers ---
        # Adjust allowed origins for your actual frontend domains
        add_header Access-Control-Allow-Origin "https://app.nebutra.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Api-Version" always;
        add_header Access-Control-Max-Age "86400" always;

        # Handle CORS preflight
        location = /options-handler {
            add_header Access-Control-Allow-Origin "https://app.nebutra.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Api-Version" always;
            add_header Access-Control-Max-Age "86400" always;
            return 204;
        }

        location / {
            # Respond to preflight OPTIONS before proxying
            if ($request_method = OPTIONS) {
                return 204;
            }

            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_api;

            # No caching on API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;

            # Increase timeouts for long-running AI/billing operations
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        # Webhook endpoints — longer timeout, no rate limiting
        # (payment processors and event sources have fixed IPs; add allow/deny rules if needed)
        location /webhooks/ {
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://nebutra_api;
            proxy_read_timeout 30s;
            # Disable rate limiting for webhooks (Stripe, etc. may burst)
            limit_req_status 200;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
    }
}
