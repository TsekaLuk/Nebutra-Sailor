packages:
  - "apps/*"
  - "packages/*"
  - "services/*"

# =============================================================================
# pnpm Catalog — single source of truth for shared dependency versions.
# Reference in any package.json as: "typescript": "catalog:"
# Run `pnpm install` after editing to regenerate the lockfile.
# =============================================================================
catalog:
  # ── Language & build tools ─────────────────────────────────────────────────
  typescript: ^5.9.3
  tsup: ^8.5.1
  tsx: ^4.21.0

  # ── Node types ─────────────────────────────────────────────────────────────
  "@types/node": ^22.19.15

  # ── React ──────────────────────────────────────────────────────────────────
  react: 19.2.4
  react-dom: 19.2.4
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3

  # ── Next.js ────────────────────────────────────────────────────────────────
  next: ^16.1.6
  next-themes: ^0.4.6
  "@next/bundle-analyzer": ^16.1.6
  eslint-config-next: "16.1.6"

  # ── Styling ────────────────────────────────────────────────────────────────
  tailwindcss: ^4.2.1
  "@tailwindcss/postcss": ^4.2.1
  lucide-react: ^0.577.0
  framer-motion: ^12.35.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.5.0

  # ── Validation ─────────────────────────────────────────────────────────────
  zod: ^4.3.6

  # ── Database ───────────────────────────────────────────────────────────────
  "@prisma/client": ^7.4.2
  "@prisma/adapter-pg": ^7.4.2
  prisma: ^7.4.2

  # ── Testing ────────────────────────────────────────────────────────────────
  vitest: ^4.0.18
  "@vitest/coverage-v8": ^4.0.18
  "@vitejs/plugin-react": ^5.1.4

  # ── Linting ────────────────────────────────────────────────────────────────
  eslint: ^9.39.3
  eslint-plugin-jsx-a11y: ^6.10.2

  # ── UI primitives ──────────────────────────────────────────────────────────
  "@radix-ui/react-slot": ^1.2.4
