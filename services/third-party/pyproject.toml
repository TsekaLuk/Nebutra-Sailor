[project]
name = "nebutra-third-party-service"
version = "0.1.0"
description = "Nebutra Third-Party Integrations microservice"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "httpx>=0.28.0",
    "gql[httpx]>=3.5.0",
    "redis>=5.2.0",
    "slowapi>=0.1.9",
    "python-dotenv>=1.0.0",
    "tenacity>=9.0.0",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"
